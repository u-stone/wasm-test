<!DOCTYPE html>
<html>

    <body>
        <script>
            const params = new URLSearchParams(window.location.search);
            const debugMode = params.get('debug') || localStorage.getItem('wasmDebugMode') || 'release';

            function f1(){
                var answer = 42;
                function f2() {
                    return answer;
                }
                return f2;
            }
            var jsShowMeTheAnswer = f1();
            Module = {}
            Module.onRuntimeInitialized = function() {
                console.log(`onRuntimeInitialized`)
                Module._func();
                console.log(`onRuntimeInitialized after`)
            }

            const badge = document.createElement('p');
            badge.textContent = `Debug mode: ${debugMode}`;
            document.body.insertBefore(badge, document.body.firstChild);

            const wasmScript = document.createElement('script');
            wasmScript.src = `../output/${debugMode}/closure.js`;
            document.body.appendChild(wasmScript);
