<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>05 - CMake Tools Target</title>
</head>
<body>
  <h1>05 - CMake Tools Target</h1>
  <p>This page loads a second Wasm target from the same CMake project to demonstrate multi-target template reuse.</p>
  <button id="run" disabled>Run Tools Target</button>

  <script>
    const scheme = 'cmake-emcmake';
    const requiresIsolation = false;
    let runtimeReady = false;
    let runStart = 0;
    const params = new URLSearchParams(window.location.search);
    const debugMode = params.get('debug') || localStorage.getItem('wasmDebugMode') || 'release';

    function appendBadges() {
      const mode = document.createElement('p');
      mode.textContent = `Debug mode: ${debugMode}`;
      document.body.insertBefore(mode, document.getElementById('run'));

      const hint = document.createElement('p');
      hint.textContent = 'Target: cmake_tools_demo';
      document.body.insertBefore(hint, document.getElementById('run'));
    }

    function emit(event, payload) {
      window.parent.postMessage(Object.assign({
        source: 'wasm-demo',
        scheme,
        event,
        ts: performance.now()
      }, payload || {}), '*');
    }

    function runDemo() {
      if (!runtimeReady) {
        return;
      }
      runStart = performance.now();
      emit('run-start');
      Module.ccall('run_cmake_tools_demo', null, [], []);
    }

    const rawLog = console.log.bind(console);
    console.log = function() {
      const original = Array.from(arguments).join(' ');
      const message = original.startsWith('[LOG]')
        ? original
        : `[LOG][scheme=${scheme}][target=tools][source=js] ${original}`;
      emit('log', { message });
      if (original.indexOf('event=run_complete') >= 0) {
        emit('run-end', { durationMs: performance.now() - runStart });
      }
      rawLog(message);
    };

    Module = {
      onRuntimeInitialized: function() {
        runtimeReady = true;
        document.getElementById('run').disabled = false;
        console.log('event=wasm_ready');
        emit('ready');
      }
    };

    if (requiresIsolation && !window.crossOriginIsolated) {
      emit('warning', { message: 'This scheme requires COOP/COEP.' });
    }

    document.getElementById('run').addEventListener('click', runDemo);
    appendBadges();

    const script = document.createElement('script');
    script.src = `../output/${debugMode}/cmake_tools_demo.js`;
    document.body.appendChild(script);
  </script>
</body>
</html>
